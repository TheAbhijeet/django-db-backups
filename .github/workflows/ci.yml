name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} (${{ matrix.db }})
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        db: [sqlite, postgres]

    # Spin up a Postgres container for the tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          uv venv
          # Install the package in editable mode + dev dependencies
          uv pip install -e .[dev]

      - name: Install PostgreSQL Client (Linux)
        if: matrix.db == 'postgres'
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run Tests
        env:
          # Pass Matrix variables to Django settings
          DB_TYPE: ${{ matrix.db }}
          DB_NAME: test_db
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_HOST: localhost
          DB_PORT: 5432
          # Ensure we use the Dropbox settings fallback for tests
          DROPBOX_ACCESS_TOKEN: "dummy_token_for_ci"
        run: |
          uv run pytest -v